name: Maven Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: maven-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java:
          - '8'
          - '17'
          - '18'
          - '19'
          - '20'
          - '21'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and run tests
        run: mvn -B -ntp verify

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk-${{ matrix.java }}
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Upload packaged jars
        if: success() && (matrix.java == '8' || matrix.java == '21')
        uses: actions/upload-artifact@v4
        with:
          name: java-code-tracer-jars-jdk-${{ matrix.java }}
          path: |
            target/*.jar
          if-no-files-found: error

