name: Release Jar

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create or update, for example v1.0.0'
        required: true
        type: string
      release_name:
        description: 'Optional release title'
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag_name="${{ inputs.tag_name }}"
            release_name="${{ inputs.release_name }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            release_name=""
          fi

          if [[ -z "${release_name}" ]]; then
            release_name="${tag_name}"
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

      - name: Build jars
        run: mvn -B -ntp clean verify

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/*.jar dist/
          (cd dist && sha256sum *.jar > SHA256SUMS)
          ls -lh dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-code-tracer-release-${{ steps.meta.outputs.tag_name }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${{ steps.meta.outputs.tag_name }}"
          release_name="${{ steps.meta.outputs.release_name }}"
          notes_file="$(mktemp)"

          cat > "$notes_file" <<EOF
          Automated release for ${tag_name}.

          Download the fat jar if you want to run JCT directly as a Java agent:
          - java-code-tracer-<version>-jar-with-dependencies.jar

          Integrity information:
          - SHA256SUMS
          EOF

          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" dist/* --clobber
          else
            gh release create "$tag_name" dist/* \
              --title "$release_name" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA"
          fi

